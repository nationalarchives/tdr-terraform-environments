name: Grant Admin SSO Access to S3 KMS Key

on:
  workflow_dispatch:
    inputs:
      kms_key_target:
        description: "KMS key to grant access to"
        required: true
        type: choice
        options:
          - module.s3_internal_kms_key.aws_kms_key.encryption
          - module.s3_upload_kms_key.aws_kms_key.encryption
      reason:
        description: "Reason for access"
        required: true
        type: string

jobs:
    grant-access:
        runs-on: ubuntu-latest
        environment: prod
        steps:
        - name: Checkout
          uses: actions/checkout@v4
    
        - name: Set up Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: 1.6.0
    
        - name: Initialize Terraform
          run: terraform init
    
        - name: Grant Access
          run: |
            terraform apply -auto-approve \
                -var="kms_key_target=${{ github.event.inputs.kms_key_target }}" \
                -var="reason=${{ github.event.inputs.reason }}"

    rollback:
        needs: grant-access
        runs-on: ubuntu-latest
        if: always()
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            # not sure about this. Copilot seems to have kicked in and suggested this. 
            role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: eu-west-2

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3

        - name: Terraform Init
          run: terraform init

        - name: Terraform Apply - Rollback
          run: |
            terraform apply -auto-approve \
                -target=${{ inputs.kms_key_target }}  