name: Grant Admin SSO Access to Production S3 KMS Key
on:
  workflow_dispatch:
    inputs:
      allow_admin_access_to_internal_kms_key:
        description: Allow admin role to use internal KMS key
        required: true
        type: boolean
      allow_admin_access_to_export_kms_keyt:
        description: Allow admin role to use export KMS key
        required: true
        type: boolean
      action:
        description: Grant or revoke access
        required: true
        type: choice
        options:
          - grant
          - revoke
      reason:
        description: Reason for access
        required: true
        type: string
      ticket:
        description: Ticket number for request (TRDR-XXXX)
        required: true
        type: string

permissions:
  id-token: write
  contents: write
concurrency:
  grou
jobs:
  apply:
