      - name: terraform apply
        uses: nationalarchives/tdr-github-actions/.github/workflows/terraform_apply.yml@17a4dacd1607170122eff29d316e220bfc10563f # v0.0.30
        with:
          repo-name: tdr-terraform-environments
          environment: ${{ github.event.inputs.environment }}
          terraform-version: 1.12.2
          allow-admin-access-internal: ${{ inputs.allow_admin_access_to_internal_kms_key }}
          allow-admin-access-export: ${{ inputs.allow_admin_access_to_export_kms_key }}
        secrets:
          MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          ACCOUNT_NUMBER: ${{ secrets.ACCOUNT_NUMBER }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          INTG_ACCOUNT_NUMBER: ${{ secrets.INTG_ACCOUNT_NUMBER }}
          STAGING_ACCOUNT_NUMBER: ${{ secrets.STAGING_ACCOUNT_NUMBER }}
          PROD_ACCOUNT_NUMBER: ${{ secrets.PROD_ACCOUNT_NUMBER }}       
      - name: Build Slack message
        env:
          ACTOR: ${{ github.actor }}
          ACTION: ${{ inputs.action }}
          TARGET: ${{ inputs.kms_key_target }}
          REASON: ${{ inputs.reason }}
          TICKET: ${{ inputs.ticket }}
        run: |
          echo "MESSAGE=${TICKET}: ${ACTOR} has ${ACTION} KMS access to ${TARGET} key. Reason: ${REASON}" >> "$GITHUB_ENV"
      - name: Send usage message
        if: always()
        uses: nationalarchives/tdr-github-actions/.github/actions/slack-send@f318ce8a5d99c08b1235663f97fdb1b35844674e # v0.0.39
        with:
          message: ${{ env.MESSAGE }}
          slack-url: ${{ secrets.SLACK_WEBHOOK }}
          