name: Grant Admin SSO Access to S3 KMS Key

on:
  workflow_dispatch:
    inputs:
      action:
        description: Grant or rollback access
        required: true
        type: choice
        options:
          - grant
          - rollback
      reason:
        description: Reason for access
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    # environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create working branch
        run: |
          BRANCH="kms-access-${{ inputs.action }}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Edit locals
        run: python ./scripts/edit_kms_locals.py "${{ inputs.action }}" "${{ inputs.reason }}"

      - name: Show diff
        run: git diff root_s3_bucket_access.tf

      - name: Commit and push to new branch
        run: |
          git add root_s3_bucket_access.tf
          git commit -m "${{ inputs.action }}: KMS access — ${{ inputs.reason }} by ${{ github.actor }}"
          git push origin "$BRANCH"

      - name: Send usage message
        if: always()
        uses: nationalarchives/tdr-github-actions/.github/actions/slack-send@f318ce8a5d99c08b1235663f97fdb1b35844674e # v0.0.39
        with:
          message: "${{ github.actor }} has ${{ inputs.action }} KMS access. Reason given: ${{ inputs.reason }}"
          slack-url: ${{ secrets.SLACK_WEBHOOK }}

